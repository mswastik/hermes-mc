<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes Mission Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* Light (default) — Tailwind slate/indigo palette */
  :root{
    --bg:#f8fafc;
    --bg-panel:#ffffff;
    --bg-panel-raised:#f1f5f9;
    --border:#e2e8f0;
    --border-soft:#eef2f7;
    --text:#0f172a;
    --text-dim:#64748b;
    --text-faint:#94a3b8;
    --amber:#4f46e5;
    --amber-dim:#c7d2fe;
    --cyan:#0891b2;
    --good:#10b981;
    --bad:#f43f5e;
    --warn:#f59e0b;
    --shadow: 0 1px 2px rgba(15,23,42,0.04), 0 1px 1px rgba(15,23,42,0.03);
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Inter', sans-serif;
  }
  /* Dark — Tailwind slate-950/indigo-400 */
  :root[data-theme="dark"]{
    --bg:#0b1120;
    --bg-panel:#111827;
    --bg-panel-raised:#1e293b;
    --border:#233047;
    --border-soft:#1a2434;
    --text:#f1f5f9;
    --text-dim:#94a3b8;
    --text-faint:#64748b;
    --amber:#818cf8;
    --amber-dim:#312e81;
    --cyan:#22d3ee;
    --good:#34d399;
    --bad:#fb7185;
    --warn:#fbbf24;
    --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 1px 1px rgba(0,0,0,0.24);
  }
  :root[data-theme="dark"] .btn.primary{color:#0b1120;}
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--sans);height:100%;}
  body{font-size:14px;-webkit-font-smoothing:antialiased;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
  ::-webkit-scrollbar-track{background:transparent;}

  a{color:var(--amber);text-decoration:none;}
  a:hover{text-decoration:underline;}
  button{font-family:var(--sans);cursor:pointer;}
  input,select,textarea{font-family:var(--sans);}

  /* ---------- Shell layout ---------- */
  .shell{display:grid;grid-template-columns:64px 1fr;grid-template-rows:auto auto 1fr;height:100vh;}

  header.topbar{
    grid-column:1/3;
    display:flex;align-items:center;gap:16px;
    padding:12px 20px;
    background:var(--bg-panel);
    border-bottom:1px solid var(--border);
  }
  .brand{display:flex;align-items:center;gap:9px;font-weight:700;letter-spacing:-0.01em;font-size:14.5px;color:var(--text);}
  .brand .mark{width:9px;height:9px;border-radius:50%;background:var(--amber);box-shadow:0 0 0 4px color-mix(in srgb, var(--amber) 15%, transparent);}
  .brand small{color:var(--text-faint);font-weight:500;letter-spacing:0;text-transform:none;margin-left:1px;font-size:13px;}

  .conn{display:flex;align-items:center;gap:8px;margin-left:auto;}
  .conn input{
    background:var(--bg);border:1px solid var(--border);color:var(--text);
    padding:7px 11px;border-radius:8px;font-size:12.5px;width:230px;font-family:var(--mono);
  }
  .conn input:focus{outline:2px solid var(--amber-dim);outline-offset:0;border-color:var(--amber);}
  .conn-dot{width:7px;height:7px;border-radius:50%;background:var(--text-faint);flex-shrink:0;}
  .conn-dot.live{background:var(--good);box-shadow:0 0 0 0 rgba(16,185,129,0.5);animation:pulse 2s infinite;}
  .conn-dot.err{background:var(--bad);}
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(16,185,129,0.4);}
    70%{box-shadow:0 0 0 6px rgba(16,185,129,0);}
    100%{box-shadow:0 0 0 0 rgba(16,185,129,0);}
  }
  .conn-label{font-family:var(--mono);font-size:11.5px;color:var(--text-dim);white-space:nowrap;}

  /* ---------- Annunciator strip ---------- */
  .annunciator{
    grid-column:1/3;
    display:flex;gap:0;
    background:var(--bg-panel);
    border-bottom:1px solid var(--border);
    overflow-x:auto;
  }
  .ann-cell{
    display:flex;flex-direction:column;justify-content:center;gap:3px;
    padding:10px 22px;border-right:1px solid var(--border-soft);min-width:120px;
  }
  .ann-cell .lbl{font-size:10.5px;letter-spacing:0.03em;text-transform:uppercase;color:var(--text-faint);font-weight:600;}
  .ann-cell .val{font-family:var(--mono);font-size:14.5px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px;}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block;}
  .dot.good{background:var(--good);}
  .dot.bad{background:var(--bad);}
  .dot.warn{background:var(--warn);}
  .dot.off{background:var(--text-faint);}

  /* ---------- Side rail ---------- */
  nav.rail{
    grid-row:3;background:var(--bg-panel);border-right:1px solid var(--border);
    display:flex;flex-direction:column;align-items:center;padding:14px 0;gap:6px;
  }
  .rail-btn{
    width:40px;height:40px;border-radius:10px;border:1px solid transparent;background:transparent;
    color:var(--text-dim);display:flex;align-items:center;justify-content:center;font-size:16px;
    position:relative;transition:background .12s,color .12s;
  }
  .rail-btn:hover{background:var(--bg-panel-raised);color:var(--text);}
  .rail-btn.active{background:var(--amber);color:#fff;}
  .rail-btn .tip{
    position:absolute;left:56px;top:50%;transform:translateY(-50%);
    background:var(--text);color:var(--bg-panel);border:1px solid var(--border);padding:5px 9px;border-radius:8px;
    font-size:11.5px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .1s;z-index:20;font-weight:500;
  }
  .rail-btn:hover .tip{opacity:1;}

  /* ---------- Main ---------- */
  main{grid-row:3;overflow-y:auto;padding:24px 28px 64px;}
  .section-title{font-size:13px;font-weight:600;letter-spacing:-0.005em;color:var(--text);margin:0 0 16px;display:flex;align-items:center;gap:10px;}
  .section-title .line{flex:1;height:1px;background:var(--border);}

  .card{background:var(--bg-panel);border:1px solid var(--border);border-radius:14px;padding:18px;box-shadow:var(--shadow);}
  .grid{display:grid;gap:16px;}
  .grid.cols-4{grid-template-columns:repeat(4,1fr);}
  .grid.cols-3{grid-template-columns:repeat(3,1fr);}
  @media(max-width:1000px){.grid.cols-4,.grid.cols-3{grid-template-columns:repeat(2,1fr);}}

  .stat-label{font-size:12px;color:var(--text-faint);font-weight:500;margin-bottom:7px;}
  .stat-value{font-family:var(--mono);font-size:24px;font-weight:700;letter-spacing:-0.01em;}
  .stat-sub{font-size:11.5px;color:var(--text-dim);margin-top:4px;}

  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th{text-align:left;font-size:11px;letter-spacing:0.02em;text-transform:uppercase;color:var(--text-faint);padding:9px 12px;border-bottom:1px solid var(--border);font-weight:600;}
  td{padding:11px 12px;border-bottom:1px solid var(--border-soft);vertical-align:middle;}
  tbody tr{cursor:pointer;transition:background .1s;}
  tbody tr:hover{background:var(--bg-panel-raised);}
  .mono{font-family:var(--mono);}
  .pill{display:inline-flex;align-items:center;gap:5px;font-family:var(--sans);font-weight:500;font-size:11.5px;padding:3px 10px;border-radius:999px;background:var(--bg-panel-raised);color:var(--text-dim);}
  .pill.amber{color:var(--amber);background:color-mix(in srgb, var(--amber) 12%, transparent);}
  .pill.cyan{color:var(--cyan);background:color-mix(in srgb, var(--cyan) 12%, transparent);}
  .pill.good{color:var(--good);background:color-mix(in srgb, var(--good) 14%, transparent);}
  .pill.bad{color:var(--bad);background:color-mix(in srgb, var(--bad) 14%, transparent);}

  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
  .toolbar select, .toolbar input{background:var(--bg-panel);border:1px solid var(--border);color:var(--text);padding:7px 11px;border-radius:8px;font-size:12.5px;}
  .btn{background:var(--bg-panel);border:1px solid var(--border);color:var(--text);padding:7px 14px;border-radius:8px;font-size:12.5px;font-weight:500;transition:background .12s,border-color .12s;}
  .btn:hover{background:var(--bg-panel-raised);border-color:var(--text-faint);}
  .btn.primary{background:var(--amber);color:#fff;border-color:var(--amber);font-weight:600;}
  .btn.primary:hover{filter:brightness(1.08);}
  .btn.danger{color:var(--bad);}
  .btn.small{padding:5px 10px;font-size:11.5px;border-radius:7px;}

  .empty{color:var(--text-faint);font-size:13px;padding:32px;text-align:center;}
  .loading{color:var(--text-faint);font-size:12.5px;font-family:var(--mono);}

  /* ---------- Drawer ---------- */
  .drawer{
    position:fixed;top:0;right:0;height:100vh;width:480px;max-width:92vw;
    background:var(--bg-panel);border-left:1px solid var(--border);
    transform:translateX(100%);transition:transform .18s ease;z-index:50;
    display:flex;flex-direction:column;box-shadow:-8px 0 24px rgba(15,23,42,0.08);
  }
  .drawer.open{transform:translateX(0);}
  .drawer-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
  .drawer-head h3{margin:0;font-size:14px;font-family:var(--mono);font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .drawer-close{background:none;border:none;color:var(--text-dim);font-size:18px;padding:2px 6px;border-radius:6px;}
  .drawer-close:hover{color:var(--text);background:var(--bg-panel-raised);}
  .drawer-body{padding:18px 20px;overflow-y:auto;flex:1;}
  .drawer-body pre{background:var(--bg);border:1px solid var(--border-soft);border-radius:8px;padding:12px;font-size:11.5px;overflow-x:auto;white-space:pre-wrap;word-break:break-word;}
  .backdrop{position:fixed;inset:0;background:rgba(15,23,42,0.35);z-index:40;opacity:0;pointer-events:none;transition:opacity .18s;backdrop-filter:blur(1px);}
  .backdrop.open{opacity:1;pointer-events:auto;}

  .msg{border-radius:10px;padding:11px 14px;margin-bottom:9px;font-size:12.5px;border-left:3px solid var(--border);background:var(--bg-panel-raised);}
  .msg.user{border-left-color:var(--cyan);}
  .msg.assistant{border-left-color:var(--amber);}
  .msg.system{border-left-color:var(--text-faint);}
  .msg.tool{border-left-color:var(--good);}
  .msg .role{font-size:9.5px;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-faint);margin-bottom:5px;font-weight:600;}
  .msg .content{white-space:pre-wrap;word-break:break-word;font-family:var(--mono);font-size:12px;line-height:1.55;}

  .log-line{font-family:var(--mono);font-size:11.5px;padding:4px 10px;border-radius:6px;white-space:pre-wrap;word-break:break-word;}
  .log-line.err{color:var(--bad);}
  .log-line.warn{color:var(--warn);}
  .log-line.debug{color:var(--text-faint);}
  .log-line.info{color:var(--text-dim);}

  .switch{position:relative;display:inline-block;width:34px;height:19px;flex-shrink:0;}
  .switch input{opacity:0;width:0;height:0;}
  .slider{position:absolute;cursor:pointer;inset:0;background:var(--border);border-radius:20px;transition:.15s;}
  .slider:before{content:"";position:absolute;height:15px;width:15px;left:2px;bottom:2px;background:#fff;border-radius:50%;transition:.15s;box-shadow:0 1px 2px rgba(0,0,0,0.2);}
  input:checked + .slider{background:var(--amber);}
  input:checked + .slider:before{transform:translateX(15px);}

  .config-item{display:flex;justify-content:space-between;gap:14px;padding:9px 0;border-bottom:1px solid var(--border-soft);font-size:12.5px;}
  .config-item .k{color:var(--text-dim);font-family:var(--mono);}
  .config-item .v{font-family:var(--mono);color:var(--text);text-align:right;word-break:break-all;max-width:60%;}
</style>
</head>
<body>

<div class="shell" id="shell">
  <header class="topbar">
    <div class="brand"><span class="mark"></span>HERMES <small>MISSION CONTROL</small></div>
    <div class="conn">
      <span class="conn-dot" id="connDot"></span>
      <span class="conn-label" id="connLabel">not connected</span>
      <input id="baseUrlInput" type="text" value="http://127.0.0.1:9119" spellcheck="false">
      <button class="btn small" id="connectBtn">Connect</button>
      <button class="btn small" id="themeToggle" title="Toggle light/dark theme">☾</button>
    </div>
  </header>

  <div class="annunciator" id="annunciator">
    <div class="ann-cell"><div class="lbl">Agent</div><div class="val" id="annVersion">—</div></div>
    <div class="ann-cell"><div class="lbl">Gateway</div><div class="val" id="annGateway"><span class="dot off"></span>—</div></div>
    <div class="ann-cell"><div class="lbl">Platforms</div><div class="val" id="annPlatforms">—</div></div>
    <div class="ann-cell"><div class="lbl">Active sessions</div><div class="val" id="annActive">—</div></div>
    <div class="ann-cell"><div class="lbl">Last poll</div><div class="val" id="annPoll">—</div></div>
  </div>

  <nav class="rail" id="rail">
    <button class="rail-btn active" data-section="sessions">◧<span class="tip">Sessions</span></button>
    <button class="rail-btn" data-section="analytics">▤<span class="tip">Analytics</span></button>
    <button class="rail-btn" data-section="logs">≣<span class="tip">Logs</span></button>
    <button class="rail-btn" data-section="cron">◔<span class="tip">Cron</span></button>
    <button class="rail-btn" data-section="skills">✦<span class="tip">Skills &amp; Tools</span></button>
    <button class="rail-btn" data-section="config">⚙<span class="tip">Config</span></button>
  </nav>

  <main id="main">
    <div class="empty">Enter your Hermes dashboard URL above and click Connect.<br><span class="mono" style="font-size:11px;">Default: hermes dashboard runs on http://127.0.0.1:9119</span></div>
  </main>
</div>

<div class="backdrop" id="backdrop"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <h3 id="drawerTitle">Detail</h3>
    <button class="drawer-close" id="drawerClose">✕</button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</div>

<script>
(function(){
  let BASE = '';
  let connected = false;
  let pollTimer = null;
  let activeSection = 'sessions';
  let logAutoRefresh = false;
  let logTimer = null;

  const $ = (id) => document.getElementById(id);
  const escapeHtml = (s) => (s==null?'':String(s)).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const timeAgo = (ts) => {
    if(!ts) return '—';
    const d = new Date(ts); if(isNaN(d)) return String(ts);
    const s = Math.floor((Date.now()-d.getTime())/1000);
    if(s<60) return s+'s ago';
    if(s<3600) return Math.floor(s/60)+'m ago';
    if(s<86400) return Math.floor(s/3600)+'h ago';
    return Math.floor(s/86400)+'d ago';
  };

  // Hermes dashboard v0.18+ requires an ephemeral session token on every
  // non-public /api route (June 2026 hardening). The dashboard injects it as
  // window.__HERMES_SESSION_TOKEN__ when this page is served same-origin from
  // the dashboard's own web_dist. Fall back to a compile-time constant so the
  // page also works when served standalone with a known token.
  const SESSION_TOKEN_FALLBACK = "__HERMES_MC_TOKEN__";
  function sessionToken(){
    return (window.__HERMES_SESSION_TOKEN__ && window.__HERMES_SESSION_TOKEN__ !== "")
      ? window.__HERMES_SESSION_TOKEN__
      : SESSION_TOKEN_FALLBACK;
  }

  async function api(path, opts){
    opts = opts || {};
    const fetchOpts = Object.assign({}, opts);
    // Always send the session token as a header so protected routes don't 401.
    fetchOpts.headers = Object.assign(
      {'X-Hermes-Session-Token': sessionToken()},
      fetchOpts.headers||{}
    );
    // Only send a Content-Type header when there's an actual body — this keeps
    // plain GETs classified as "simple" cross-origin requests so the browser
    // skips CORS preflight for them entirely (fewer moving parts to trip on).
    if(fetchOpts.body){
      fetchOpts.headers = Object.assign({'Content-Type':'application/json'}, fetchOpts.headers||{});
    }
    let res;
    try{
      res = await fetch(BASE + path, fetchOpts);
    }catch(e){
      throw new Error(path+' → network/CORS error ('+e.message+')');
    }
    if(!res.ok) throw new Error(path+' → HTTP '+res.status);
    return res.json();
  }

  function setConn(state, label){
    const dot = $('connDot');
    dot.className = 'conn-dot' + (state==='live' ? ' live' : state==='err' ? ' err' : '');
    $('connLabel').textContent = label;
  }

  function openDrawer(title, html){
    $('drawerTitle').textContent = title;
    $('drawerBody').innerHTML = html;
    $('drawer').classList.add('open');
    $('backdrop').classList.add('open');
  }
  function closeDrawer(){
    $('drawer').classList.remove('open');
    $('backdrop').classList.remove('open');
  }
  $('drawerClose').onclick = closeDrawer;
  $('backdrop').onclick = closeDrawer;

  // ---------- Annunciator / status polling ----------
  async function pollStatus(){
    try{
      const s = await api('/api/status');
      connected = true;
      setConn('live', 'connected');
      $('annVersion').innerHTML = escapeHtml(s.version || s.agent_version || '—');
      const gwUp = s.gateway_running || (s.gateway && s.gateway.running) || s.gateway_status === 'running';
      $('annGateway').innerHTML = '<span class="dot '+(gwUp?'good':'off')+'"></span>' + (gwUp ? 'running' : 'stopped');
      let platforms = s.platforms || (s.gateway && s.gateway.platforms) || [];
      if(Array.isArray(platforms) && platforms.length){
        $('annPlatforms').innerHTML = platforms.map(p=>{
          const name = typeof p === 'string' ? p : (p.name||p.platform||'?');
          const up = typeof p === 'object' ? (p.connected||p.running||p.status==='connected') : true;
          return '<span class="dot '+(up?'good':'bad')+'" style="margin-right:4px"></span>'+escapeHtml(name);
        }).join(' &nbsp; ');
      } else {
        $('annPlatforms').textContent = 'none';
      }
      $('annActive').textContent = (s.active_sessions ?? s.active_session_count ?? '0');
      $('annPoll').textContent = new Date().toLocaleTimeString();
    }catch(e){
      connected = false;
      setConn('err', 'unreachable');
      $('annGateway').innerHTML = '<span class="dot bad"></span>error';
    }
  }

  // ---------- Sections ----------
  const sections = {
    sessions: renderSessions,
    analytics: renderAnalytics,
    logs: renderLogs,
    cron: renderCron,
    skills: renderSkills,
    config: renderConfig,
  };

  async function renderSessions(){
    const main = $('main');
    main.innerHTML = `
      <div class="section-title">Sessions<div class="line"></div></div>
      <div class="toolbar">
        <input id="sessSearch" type="text" placeholder="Search message content…" style="width:280px;">
        <button class="btn small" id="sessSearchBtn">Search</button>
        <button class="btn small" id="sessRefreshBtn">Refresh</button>
      </div>
      <div class="card"><div id="sessTableWrap" class="loading">Loading sessions…</div></div>
    `;
    $('sessRefreshBtn').onclick = loadSessions;
    $('sessSearchBtn').onclick = searchSessions;
    $('sessSearch').addEventListener('keydown', e => { if(e.key==='Enter') searchSessions(); });
    await loadSessions();
  }

  function sessionRowsHtml(list){
    if(!list || !list.length) return '<div class="empty">No sessions yet.</div>';
    return `<table><thead><tr>
        <th>Title</th><th>Source</th><th>Model</th><th>Tokens</th><th>Tools</th><th>Last active</th>
      </tr></thead><tbody>` +
      list.map(s => {
        const id = s.id || s.session_id;
        const model = s.model || s.model_name || '—';
        const src = s.source || s.platform || 'cli';
        const tokens = (s.input_tokens!=null || s.output_tokens!=null)
          ? `${s.input_tokens??0}/${s.output_tokens??0}` : (s.tokens ?? '—');
        return `<tr data-id="${escapeHtml(id)}">
          <td>${escapeHtml(s.title || s.preview || id)}</td>
          <td><span class="pill">${escapeHtml(src)}</span></td>
          <td class="mono">${escapeHtml(model)}</td>
          <td class="mono">${escapeHtml(tokens)}</td>
          <td class="mono">${escapeHtml(s.tool_call_count ?? s.tool_calls ?? '0')}</td>
          <td class="mono">${timeAgo(s.last_active || s.updated_at || s.timestamp)}</td>
        </tr>`;
      }).join('') + '</tbody></table>';
  }

  async function loadSessions(){
    const wrap = $('sessTableWrap');
    wrap.innerHTML = '<div class="loading">Loading sessions…</div>';
    try{
      const data = await api('/api/sessions');
      const list = data.sessions || data;
      wrap.innerHTML = sessionRowsHtml(list);
      wrap.querySelectorAll('tr[data-id]').forEach(tr => tr.onclick = () => openSession(tr.dataset.id));
    }catch(e){ wrap.innerHTML = '<div class="empty">Could not load sessions — '+escapeHtml(e.message)+'</div>'; }
  }

  async function searchSessions(){
    const q = $('sessSearch').value.trim();
    if(!q) return loadSessions();
    const wrap = $('sessTableWrap');
    wrap.innerHTML = '<div class="loading">Searching…</div>';
    try{
      const data = await api('/api/sessions/search?q=' + encodeURIComponent(q));
      const list = data.results || data.sessions || data;
      if(!list || !list.length){ wrap.innerHTML = '<div class="empty">No matches for “'+escapeHtml(q)+'”.</div>'; return; }
      wrap.innerHTML = '<table><thead><tr><th>Session</th><th>Snippet</th></tr></thead><tbody>' +
        list.map(r => `<tr data-id="${escapeHtml(r.id||r.session_id)}">
            <td class="mono">${escapeHtml(r.title || r.id || r.session_id)}</td>
            <td>${r.snippet || r.highlight || ''}</td>
          </tr>`).join('') + '</tbody></table>';
      wrap.querySelectorAll('tr[data-id]').forEach(tr => tr.onclick = () => openSession(tr.dataset.id));
    }catch(e){ wrap.innerHTML = '<div class="empty">Search failed — '+escapeHtml(e.message)+'</div>'; }
  }

  async function openSession(id){
    openDrawer(id, '<div class="loading">Loading conversation…</div>');
    try{
      const data = await api('/api/sessions/'+encodeURIComponent(id)+'/messages');
      const msgs = data.messages || data;
      if(!msgs || !msgs.length){ $('drawerBody').innerHTML = '<div class="empty">No messages.</div>'; return; }
      $('drawerBody').innerHTML = msgs.map(m => {
        const role = (m.role||'system').toLowerCase();
        let body = m.content;
        if(typeof body !== 'string') body = JSON.stringify(body, null, 2);
        let toolBlock = '';
        if(m.tool_calls && m.tool_calls.length){
          toolBlock = m.tool_calls.map(tc => `<pre>${escapeHtml(tc.function?.name || tc.name || 'tool')}(${escapeHtml(JSON.stringify(tc.function?.arguments || tc.arguments || {}))})</pre>`).join('');
        }
        return `<div class="msg ${role.replace(/[^a-z]/g,'')||'system'}">
            <div class="role">${escapeHtml(role)}${m.timestamp?(' · '+timeAgo(m.timestamp)):''}</div>
            <div class="content">${escapeHtml(body)}</div>
            ${toolBlock}
          </div>`;
      }).join('');
    }catch(e){ $('drawerBody').innerHTML = '<div class="empty">Could not load messages — '+escapeHtml(e.message)+'</div>'; }
  }

  async function renderAnalytics(){
    const main = $('main');
    main.innerHTML = `
      <div class="section-title">Analytics<div class="line"></div></div>
      <div class="toolbar">
        <select id="analyDays"><option value="7">Last 7 days</option><option value="30" selected>Last 30 days</option><option value="90">Last 90 days</option></select>
      </div>
      <div class="grid cols-4" id="analyStats" style="margin-bottom:16px;"></div>
      <div class="grid cols-2" style="grid-template-columns:1.3fr 1fr;">
        <div class="card"><div class="section-title" style="margin-bottom:8px;">Daily breakdown<div class="line"></div></div><div id="analyDaily" class="loading">Loading…</div></div>
        <div class="card"><div class="section-title" style="margin-bottom:8px;">Per-model<div class="line"></div></div><div id="analyModel" class="loading">Loading…</div></div>
      </div>
    `;
    $('analyDays').onchange = loadAnalytics;
    await loadAnalytics();
  }

  async function loadAnalytics(){
    const days = $('analyDays').value;
    try{
      const d = await api('/api/analytics/usage?days='+days);
      const stats = $('analyStats');
      stats.innerHTML = [
        ['Input tokens', d.total_input_tokens ?? d.input_tokens ?? '—'],
        ['Output tokens', d.total_output_tokens ?? d.output_tokens ?? '—'],
        ['Cache hit rate', (d.cache_hit_rate!=null ? (d.cache_hit_rate*100).toFixed(1)+'%' : (d.cache_hit_percent ?? '—'))],
        ['Est. cost', d.total_cost!=null ? ('$'+Number(d.total_cost).toFixed(2)) : '—'],
      ].map(([lbl,val]) => `<div class="card"><div class="stat-label">${lbl}</div><div class="stat-value">${escapeHtml(val)}</div></div>`).join('');

      const daily = d.daily || d.by_day || [];
      $('analyDaily').innerHTML = daily.length ? '<table><thead><tr><th>Date</th><th>Sessions</th><th>In</th><th>Out</th><th>Cost</th></tr></thead><tbody>' +
        daily.map(r => `<tr><td class="mono">${escapeHtml(r.date)}</td><td class="mono">${escapeHtml(r.session_count ?? r.sessions ?? '—')}</td><td class="mono">${escapeHtml(r.input_tokens ?? '—')}</td><td class="mono">${escapeHtml(r.output_tokens ?? '—')}</td><td class="mono">${r.cost!=null?('$'+Number(r.cost).toFixed(2)):'—'}</td></tr>`).join('') + '</tbody></table>'
        : '<div class="empty">No data for this period.</div>';

      const models = d.by_model || d.models || [];
      $('analyModel').innerHTML = models.length ? '<table><thead><tr><th>Model</th><th>Sessions</th><th>Tokens</th><th>Cost</th></tr></thead><tbody>' +
        models.map(r => `<tr><td class="mono">${escapeHtml(r.model)}</td><td class="mono">${escapeHtml(r.session_count ?? r.sessions ?? '—')}</td><td class="mono">${escapeHtml((r.input_tokens??0)+(r.output_tokens??0))}</td><td class="mono">${r.cost!=null?('$'+Number(r.cost).toFixed(2)):'—'}</td></tr>`).join('') + '</tbody></table>'
        : '<div class="empty">No data.</div>';
    }catch(e){
      $('analyStats').innerHTML = '<div class="empty">Could not load analytics — '+escapeHtml(e.message)+'</div>';
    }
  }

  async function renderLogs(){
    const main = $('main');
    main.innerHTML = `
      <div class="section-title">Logs<div class="line"></div></div>
      <div class="toolbar">
        <select id="logFile"><option value="agent">agent</option><option value="gateway">gateway</option><option value="errors">errors</option></select>
        <select id="logLevel"><option value="">all levels</option><option>DEBUG</option><option>INFO</option><option>WARNING</option><option>ERROR</option></select>
        <select id="logComponent"><option value="">all components</option><option value="gateway">gateway</option><option value="agent">agent</option><option value="tools">tools</option><option value="cli">cli</option><option value="cron">cron</option></select>
        <select id="logLines"><option>50</option><option selected>100</option><option>200</option><option>500</option></select>
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-dim);">
          <label class="switch"><input type="checkbox" id="logAuto"><span class="slider"></span></label> auto-refresh
        </label>
        <button class="btn small" id="logRefreshBtn">Refresh</button>
      </div>
      <div class="card" style="max-height:65vh;overflow-y:auto;"><div id="logBody" class="loading">Loading logs…</div></div>
    `;
    ['logFile','logLevel','logComponent','logLines'].forEach(id => $(id).onchange = loadLogs);
    $('logRefreshBtn').onclick = loadLogs;
    $('logAuto').onchange = (e) => {
      logAutoRefresh = e.target.checked;
      if(logTimer) clearInterval(logTimer);
      if(logAutoRefresh) logTimer = setInterval(loadLogs, 5000);
    };
    await loadLogs();
  }

  async function loadLogs(){
    const body = $('logBody');
    const file = $('logFile').value, level = $('logLevel').value, component = $('logComponent').value, lines = $('logLines').value;
    try{
      const params = new URLSearchParams({file, lines});
      if(level) params.set('level', level);
      if(component) params.set('component', component);
      const d = await api('/api/logs?'+params.toString());
      const list = d.lines || d.logs || d;
      if(!list || !list.length){ body.innerHTML = '<div class="empty">No log lines.</div>'; return; }
      body.innerHTML = list.map(l => {
        const text = typeof l === 'string' ? l : (l.text || l.message || JSON.stringify(l));
        const cls = /error/i.test(text) ? 'err' : /warn/i.test(text) ? 'warn' : /debug/i.test(text) ? 'debug' : 'info';
        return `<div class="log-line ${cls}">${escapeHtml(text)}</div>`;
      }).join('');
    }catch(e){ body.innerHTML = '<div class="empty">Could not load logs — '+escapeHtml(e.message)+'</div>'; }
  }

  async function renderCron(){
    const main = $('main');
    main.innerHTML = `
      <div class="section-title">Cron jobs<div class="line"></div></div>
      <div class="toolbar"><button class="btn small" id="cronRefresh">Refresh</button></div>
      <div class="card"><div id="cronBody" class="loading">Loading jobs…</div></div>
    `;
    $('cronRefresh').onclick = loadCron;
    await loadCron();
  }

  async function loadCron(){
    const body = $('cronBody');
    try{
      const d = await api('/api/cron/jobs');
      const jobs = d.jobs || d;
      if(!jobs || !jobs.length){ body.innerHTML = '<div class="empty">No scheduled jobs.</div>'; return; }
      body.innerHTML = '<table><thead><tr><th>Name</th><th>Prompt</th><th>Schedule</th><th>State</th><th>Next run</th><th></th></tr></thead><tbody>' +
        jobs.map(j => {
          const id = j.id || j.job_id;
          const state = (j.state || j.status || 'enabled').toLowerCase();
          const pillClass = state==='paused' ? '' : state==='error' ? 'bad' : 'good';
          return `<tr>
            <td class="mono">${escapeHtml(j.name || id)}</td>
            <td>${escapeHtml((j.prompt||'').slice(0,60))}${(j.prompt||'').length>60?'…':''}</td>
            <td class="mono">${escapeHtml(j.schedule)}</td>
            <td><span class="pill ${pillClass}">${escapeHtml(state)}</span></td>
            <td class="mono">${escapeHtml(j.next_run || '—')}</td>
            <td>
              <button class="btn small" data-act="trigger" data-id="${escapeHtml(id)}">Run</button>
              <button class="btn small" data-act="${state==='paused'?'resume':'pause'}" data-id="${escapeHtml(id)}">${state==='paused'?'Resume':'Pause'}</button>
              <button class="btn small danger" data-act="delete" data-id="${escapeHtml(id)}">Delete</button>
            </td>
          </tr>`;
        }).join('') + '</tbody></table>';
      body.querySelectorAll('button[data-act]').forEach(btn => {
        btn.onclick = async () => {
          const act = btn.dataset.act, id = btn.dataset.id;
          try{
            if(act==='delete'){ if(!confirm('Delete this job?')) return; await api('/api/cron/jobs/'+id, {method:'DELETE'}); }
            else { await api('/api/cron/jobs/'+id+'/'+act, {method:'POST'}); }
            loadCron();
          }catch(e){ alert('Action failed: '+e.message); }
        };
      });
    }catch(e){ body.innerHTML = '<div class="empty">Could not load cron jobs — '+escapeHtml(e.message)+'</div>'; }
  }

  async function renderSkills(){
    const main = $('main');
    main.innerHTML = `
      <div class="section-title">Skills<div class="line"></div></div>
      <div class="card" style="margin-bottom:16px;"><div id="skillsBody" class="loading">Loading skills…</div></div>
      <div class="section-title">Toolsets<div class="line"></div></div>
      <div class="card"><div id="toolsetsBody" class="loading">Loading toolsets…</div></div>
    `;
    loadSkills();
    loadToolsets();
  }

  async function loadSkills(){
    const body = $('skillsBody');
    try{
      const d = await api('/api/skills');
      const skills = d.skills || d;
      if(!skills || !skills.length){ body.innerHTML = '<div class="empty">No skills found.</div>'; return; }
      body.innerHTML = '<table><thead><tr><th>Name</th><th>Category</th><th>Description</th><th>Enabled</th></tr></thead><tbody>' +
        skills.map(s => `<tr>
            <td class="mono">${escapeHtml(s.name)}</td>
            <td><span class="pill">${escapeHtml(s.category||'—')}</span></td>
            <td>${escapeHtml(s.description||'')}</td>
            <td><label class="switch"><input type="checkbox" data-skill="${escapeHtml(s.name)}" ${s.enabled?'checked':''}><span class="slider"></span></label></td>
          </tr>`).join('') + '</tbody></table>';
      body.querySelectorAll('input[data-skill]').forEach(cb => {
        cb.onchange = async () => {
          try{ await api('/api/skills/toggle', {method:'PUT', body: JSON.stringify({name: cb.dataset.skill, enabled: cb.checked})}); }
          catch(e){ alert('Toggle failed: '+e.message); cb.checked = !cb.checked; }
        };
      });
    }catch(e){ body.innerHTML = '<div class="empty">Could not load skills — '+escapeHtml(e.message)+'</div>'; }
  }

  async function loadToolsets(){
    const body = $('toolsetsBody');
    try{
      const d = await api('/api/tools/toolsets');
      const toolsets = d.toolsets || d;
      if(!toolsets || !toolsets.length){ body.innerHTML = '<div class="empty">No toolsets found.</div>'; return; }
      body.innerHTML = '<table><thead><tr><th>Toolset</th><th>Tools</th><th>Status</th></tr></thead><tbody>' +
        toolsets.map(t => `<tr data-name="${escapeHtml(t.label||t.name)}">
            <td class="mono">${escapeHtml(t.label || t.name)}</td>
            <td>${(t.tools||[]).length} tool(s)</td>
            <td><span class="pill ${t.active||t.configured?'good':''}">${(t.active||t.configured)?'active':'inactive'}</span></td>
          </tr>`).join('') + '</tbody></table>';
      body.querySelectorAll('tr[data-name]').forEach((tr,i) => tr.onclick = () => {
        const t = toolsets[i];
        openDrawer(t.label||t.name, '<pre>'+escapeHtml(JSON.stringify(t,null,2))+'</pre>');
      });
    }catch(e){ body.innerHTML = '<div class="empty">Could not load toolsets — '+escapeHtml(e.message)+'</div>'; }
  }

  async function renderConfig(){
    const main = $('main');
    main.innerHTML = `
      <div class="section-title">Config<div class="line"></div></div>
      <div class="toolbar">
        <input id="configSearch" type="text" placeholder="Filter fields…" style="width:280px;">
        <button class="btn small" id="configRawBtn">View raw JSON</button>
      </div>
      <div class="card"><div id="configBody" class="loading">Loading config…</div></div>
    `;
    $('configRawBtn').onclick = async () => {
      const d = await api('/api/config');
      openDrawer('config.yaml', '<pre>'+escapeHtml(JSON.stringify(d,null,2))+'</pre>');
    };
    let flat = [];
    function flatten(obj, prefix){
      Object.entries(obj||{}).forEach(([k,v]) => {
        const key = prefix ? prefix+'.'+k : k;
        if(v && typeof v === 'object' && !Array.isArray(v)) flatten(v, key);
        else flat.push([key, Array.isArray(v) ? JSON.stringify(v) : v]);
      });
    }
    function draw(filter){
      const rows = flat.filter(([k]) => !filter || k.toLowerCase().includes(filter.toLowerCase()));
      $('configBody').innerHTML = rows.length
        ? rows.map(([k,v]) => `<div class="config-item"><span class="k">${escapeHtml(k)}</span><span class="v">${escapeHtml(v)}</span></div>`).join('')
        : '<div class="empty">No matching fields.</div>';
    }
    try{
      const d = await api('/api/config');
      flatten(d.config || d, '');
      draw('');
      $('configSearch').oninput = (e) => draw(e.target.value);
    }catch(e){ $('configBody').innerHTML = '<div class="empty">Could not load config — '+escapeHtml(e.message)+'</div>'; }
  }

  // ---------- Nav wiring ----------
  document.querySelectorAll('.rail-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.rail-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeSection = btn.dataset.section;
      closeDrawer();
      sections[activeSection]();
    };
  });

  $('connectBtn').onclick = async () => {
    BASE = $('baseUrlInput').value.trim().replace(/\/$/, '');
    setConn('', 'connecting…');
    await pollStatus();
    if(connected){
      if(pollTimer) clearInterval(pollTimer);
      pollTimer = setInterval(pollStatus, 5000);
      sections[activeSection]();
    } else {
      $('main').innerHTML = '<div class="empty">Could not reach '+escapeHtml(BASE)+'.<br>Check the URL, make sure <span class="mono">hermes dashboard</span> is running, and that this page is served from an allowed origin (localhost:9119 / :3000 / :5173).</div>';
    }
  };
  $('baseUrlInput').addEventListener('keydown', e => { if(e.key==='Enter') $('connectBtn').click(); });

  // ---------- Theme toggle (light/dark), persisted locally ----------
  function applyTheme(t){
    document.documentElement.setAttribute('data-theme', t);
    $('themeToggle').textContent = t === 'light' ? '☀' : '☾';
    try{ localStorage.setItem('hermes-mc-theme', t); }catch(e){}
  }
  $('themeToggle').onclick = () => {
    const current = document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
    applyTheme(current === 'light' ? 'dark' : 'light');
  };
  (function initTheme(){
    let saved = 'light';
    try{ saved = localStorage.getItem('hermes-mc-theme') || 'light'; }catch(e){}
    applyTheme(saved);
  })();

  // Auto-connect on load using default URL
  $('connectBtn').click();
})();
</script>
</body>
</html>
