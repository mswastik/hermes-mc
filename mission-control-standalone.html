<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hermes Mission Control</title>
<!-- React UMD (pinned 18.3.1, vendored locally so the page needs no
     internet). The react + react-dom pair is guaranteed matching. -->
<script src="./vendor/react.production.min.js"></script>
<script src="./vendor/react-dom.production.min.js"></script>
<style>
  :root{
    --mc-bg:#0b0e14; --mc-panel:#121723; --mc-panel-2:#0f1420; --mc-border:#1e2636;
    --mc-fg:#f4f6fa; --mc-muted:#a3b1c2; --mc-faint:#7d8aa0;
    --mc-accent:#2dd4bf; --mc-accent-2:#38bdf8;
    --mc-good:#34d399; --mc-warn:#fbbf24; --mc-bad:#f87171; --mc-info:#60a5fa;
    --mc-rail:#0d1119;
  }
  [data-theme="light"]{
    --mc-bg:#f4f6fa; --mc-panel:#ffffff; --mc-panel-2:#eef1f6; --mc-border:#d6dce5;
    --mc-fg:#1a2230; --mc-muted:#64748b; --mc-faint:#94a3b8;
    --mc-accent:#0d9488; --mc-accent-2:#0284c7;
    --mc-good:#059669; --mc-warn:#d97706; --mc-bad:#dc2626; --mc-info:#2563eb;
    --mc-rail:#e9edf3;
  }
  [data-theme="dark"]{
    --mc-fg:#f4f6fa;
    }
  
  [data-theme="light"] .mc-logo{color:#fff}
  [data-theme="light"] .mc-nav button:hover{background:#e3e8f0}
  [data-theme="light"] .mc-nav button.active{background:#d6ecf2;color:#0b3b46}
  [data-theme="light"] .mc-table tbody tr:hover{background:#eef2f8}
  [data-theme="light"] .mc-card:hover{background:#eef2f8}
  [data-theme="light"] .mc-card.sel{border-color:var(--mc-accent);box-shadow:0 0 0 1px var(--mc-accent)}
  [data-theme="light"] .mc-logs{background:#0b0e14;color:#d4dae4}
  [data-theme="light"] .mc-stat .v{color:var(--mc-fg)}
  [data-theme="light"] .mc-logo{color:#fff}
  [data-theme="light"] .mc-nav button:hover{background:#e3e8f0;color:var(--mc-fg)}
  [data-theme="light"] .mc-nav button.active{background:#d6ecf2;color:#0b3b46;box-shadow:inset 2px 0 0 var(--mc-accent)}
  [data-theme="light"] .mc-btn{background:#e2e8f1;border-color:#cdd5e0;color:var(--mc-fg)}
  [data-theme="light"] .mc-btn:hover{background:#d3dce8}
  [data-theme="light"] .mc-btn.primary{color:#fff}
  [data-theme="light"] .mc-input{background:#fff;border-color:#cdd5e0;color:var(--mc-fg)}
  [data-theme="light"] .mc-topbar{background:#fff}
  [data-theme="light"] .mc-body{background:var(--mc-bg)}
  [data-theme="light"] .mc-table{background:#fff}
  [data-theme="light"] .mc-table th{background:var(--mc-panel-2)}
  [data-theme="light"] .mc-table tbody tr:hover{background:#eef2f8}
  [data-theme="light"] .mc-card{background:#fff}
  [data-theme="light"] .mc-card:hover{background:#eef2f8}
  [data-theme="light"] .mc-card.sel{border-color:var(--mc-accent);box-shadow:0 0 0 1px var(--mc-accent)}
  [data-theme="light"] .mc-def dd.mono{color:var(--mc-fg)}
  [data-theme="light"] .mc-chat .mc-msg.assistant{background:#fff;border-color:#d6dce5}
  [data-theme="light"] .mc-detail-pane{background:#fff}
  [data-theme="light"] .mc-empty{background:#fff;color:var(--mc-faint)}
  [data-theme="light"] .mc-err{background:#fde8e8;border-color:#f5c2c2;color:#b91c1c}
  [data-theme="light"] .mc-logs{background:#0b0e14;color:#d4dae4}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--mc-bg);color:var(--mc-fg);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased}
  a{color:var(--mc-accent-2);text-decoration:none}
  button{font:inherit;color:inherit;cursor:pointer}
  .mc-shell{display:flex;height:100vh;overflow:hidden}
  /* ---- left rail ---- */
  .mc-rail{width:228px;flex:0 0 228px;background:var(--mc-rail);border-right:1px solid var(--mc-border);
    display:flex;flex-direction:column;overflow-y:auto}
  .mc-brand{display:flex;align-items:center;gap:10px;padding:16px 16px 14px}
  .mc-logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--mc-accent),var(--mc-accent-2));
    display:flex;align-items:center;justify-content:center;font-weight:800;color:#04121a;font-size:16px}
  .mc-brand h1{font-size:15px;margin:0;font-weight:700;letter-spacing:.2px}
  .mc-brand .sub{font-size:11px;color:var(--mc-faint)}
  .mc-nav{padding:6px 8px;display:flex;flex-direction:column;gap:2px}
  .mc-nav button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:0;
    padding:9px 10px;border-radius:8px;color:var(--mc-muted);font-size:13.5px;transition:.12s}
  .mc-nav button:hover{background:#161d2b;color:var(--mc-fg)}
  .mc-nav button.active{background:#16263a;color:var(--mc-fg);box-shadow:inset 2px 0 0 var(--mc-accent)}
  .mc-nav .ico{width:18px;height:18px;flex:0 0 18px;color:var(--mc-accent-2)}
  .mc-rail-foot{margin-top:auto;padding:12px 14px;font-size:11px;color:var(--mc-faint);border-top:1px solid var(--mc-border)}
  .mc-rail-foot .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--mc-good);margin-right:6px;vertical-align:middle}
  /* ---- main ---- */
  .mc-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .mc-topbar{display:flex;align-items:center;gap:14px;padding:12px 20px;border-bottom:1px solid var(--mc-border);
    background:var(--mc-panel-2)}
  .mc-topbar h2{margin:0;font-size:16px;font-weight:700}
  .mc-topbar .crumb{color:var(--mc-faint);font-size:12px}
  .mc-topbar .spacer{flex:1}
  .mc-btn{background:#1b2433;border:1px solid var(--mc-border);border-radius:8px;padding:7px 12px;font-size:13px;display:inline-flex;align-items:center;gap:6px}
  .mc-btn:hover{background:#222d3f}
  .mc-btn.primary{background:var(--mc-accent);color:#04121a;border-color:transparent;font-weight:600}
  .mc-btn.icon{padding:7px}
  .mc-btn.danger{background:#7f1d1d;border-color:#b91c1c;color:#fecaca;font-weight:600}
  .mc-btn.danger:hover{background:#991b1b}
  .mc-btn.sm{padding:4px 9px;font-size:12px}
  /* ---- modal (delete confirm) ---- */
  .mc-modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:200}
  .mc-modal{background:var(--mc-panel);border:1px solid var(--mc-border);border-radius:12px;padding:20px;width:420px;max-width:92vw;box-shadow:0 18px 50px rgba(0,0,0,.5)}
  .mc-modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
  .mc-body{flex:1;overflow-y:auto;padding:0 15px 0 15px}
  .mc-section{margin-bottom:26px}
  .mc-section > h3{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--mc-faint);margin:0 0 12px}
  /* ---- stat grid ---- */
  .mc-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
  .mc-stat{background:var(--mc-panel);border:1px solid var(--mc-border);border-radius:10px;padding:14px 16px}
  .mc-stat .v{font-size:22px;font-weight:700;line-height:1.1}
  .mc-stat .k{font-size:11.5px;color:var(--mc-muted);margin-top:4px}
  .mc-stat .v.good{color:var(--mc-good)} .mc-stat .v.warn{color:var(--mc-warn)} .mc-stat .v.bad{color:var(--mc-bad)}
  /* ---- table ---- */
  .mc-table{width:100%;border-collapse:collapse;background:var(--mc-panel);border:1px solid var(--mc-border);border-radius:10px;overflow:hidden}
  .mc-table th,.mc-table td{text-align:left;padding:10px 14px;border-bottom:1px solid var(--mc-border);font-size:13px;vertical-align:middle}
  .mc-table th{background:var(--mc-panel-2);color:var(--mc-muted);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;cursor:pointer;user-select:none}
  .mc-table th:hover{color:var(--mc-fg)}
  .mc-table tr:last-child td{border-bottom:0}
  .mc-table tbody tr:hover{background:#161d2b}
  .mc-table .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;color:var(--mc-muted)}
  /* ---- pills / badges ---- */
  .pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-size:11.5px;font-weight:600;border:1px solid transparent}
  .pill .d{width:6px;height:6px;border-radius:50%}
  .pill.good{background:rgba(52,211,153,.12);color:var(--mc-good);border-color:rgba(52,211,153,.3)}
  .pill.good .d{background:var(--mc-good)}
  .pill.warn{background:rgba(251,191,36,.12);color:var(--mc-warn);border-color:rgba(251,191,36,.3)}
  .pill.warn .d{background:var(--mc-warn)}
  .pill.bad{background:rgba(248,113,113,.12);color:var(--mc-bad);border-color:rgba(248,113,113,.3)}
  .pill.bad .d{background:var(--mc-bad)}
  .pill.muted{background:#1a2230;color:var(--mc-muted)}
  .pill.info{background:rgba(96,165,250,.12);color:var(--mc-info);border-color:rgba(96,165,250,.3)}
  .pill.info .d{background:var(--mc-info)}
  /* ---- master/detail ---- */
  .mc-split{display:flex;gap:16px;align-items:flex-start}
  .mc-list{flex:0 0 360px;max-width:360px;display:flex;flex-direction:column;gap:8px}
  .mc-card{background:var(--mc-panel);border:1px solid var(--mc-border);border-radius:10px;padding:12px 14px;cursor:pointer;transition:.12s}
  .mc-card:hover{border-color:#2b3a52;background:#151c2a}
  .mc-card.sel{border-color:var(--mc-accent);box-shadow:0 0 0 1px var(--mc-accent)}
  .mc-card .ttl{font-weight:600;font-size:13.5px;display:flex;justify-content:space-between;gap:8px;align-items:center}
  .mc-card .meta{font-size:11.5px;color:var(--mc-muted);margin-top:4px}
  .mc-detail-pane{flex:1;min-width:0;background:var(--mc-panel);border:1px solid var(--mc-border);border-radius:10px;padding:18px}
  /* ---- def list ---- */
  .mc-def{display:grid;grid-template-columns:200px 1fr;gap:6px 16px;margin:0}
  .mc-def dt{color:var(--mc-muted);font-size:12.5px;padding:4px 0}
  .mc-def dd{margin:0;padding:4px 0;font-size:13px;word-break:break-word}
  .mc-def dd.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;color:var(--mc-fg)}
  /* ---- config tree ---- */
  .mc-tree{font-size:13px}
  .mc-tree .node{padding:3px 0}
  .mc-tree .key{color:var(--mc-accent-2);font-family:ui-monospace,Menlo,monospace}
  .mc-tree .ty{color:var(--mc-faint);font-size:11px;margin-left:6px}
  .mc-tree .val{color:var(--mc-fg);font-family:ui-monospace,Menlo,monospace;margin-left:8px}
  .mc-tree .children{margin-left:16px;border-left:1px solid var(--mc-border);padding-left:10px}
  .mc-tree .row{display:flex;align-items:baseline;gap:4px;padding:1px 0}
  .mc-tree .tw{width:12px;color:var(--mc-faint);cursor:pointer;user-select:none}
  /* ---- config editor (Stage 2) ---- */
  .cfg-editor{max-height:calc(100vh - 140px);overflow:auto;padding:4px 0}
  .cfg-obj{display:flex;flex-direction:column;gap:4px}
  .cfg-nested{margin:6px 0 6px 14px;border-left:2px solid var(--mc-border);padding-left:12px}
  .cfg-head{font-size:12px;font-weight:600;color:var(--mc-accent-2);margin:4px 0 2px;font-family:ui-monospace,Menlo,monospace}
  .cfg-row{display:grid;grid-template-columns:240px 1fr auto;align-items:center;gap:10px;padding:4px 6px;border-radius:6px}
  .cfg-row:hover{background:var(--mc-panel-2)}
  .cfg-key{font-family:ui-monospace,Menlo,monospace;font-size:12.5px;color:var(--mc-fg);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cfg-input{max-width:420px;width:100%}
  .cfg-area{width:100%;max-width:560px;font-family:ui-monospace,Menlo,monospace;font-size:12px}
  .cfg-type{font-size:11px;color:var(--mc-faint);white-space:nowrap}
  .cfg-toggle{width:50px;height:24px;border-radius:13px;background:var(--mc-border);border:0;position:relative;transition:.15s;flex:0 0 auto;cursor:pointer;display:inline-flex;align-items:center;padding:0 6px;box-sizing:border-box}
  .cfg-toggle.on{background:var(--mc-accent)}
  .cfg-toggle .knob{position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.15s;box-shadow:0 1px 2px rgba(0,0,0,.3)}
  .cfg-toggle.on .knob{left:28px}
  .cfg-toggle .t-label{position:absolute;right:7px;font-size:9px;font-weight:700;color:var(--mc-fg);letter-spacing:.5px;opacity:.55}
  .cfg-toggle.on .t-label{left:7px;right:auto;color:#04121a;opacity:1}
  [data-theme="light"] .cfg-toggle{background:#c4cdda}
  [data-theme="light"] .cfg-toggle.on{background:var(--mc-accent)}
  /* ---- misc ---- */
  .mc-spin{width:22px;height:22px;border:2.5px solid var(--mc-border);border-top-color:var(--mc-accent);border-radius:50%;animation:sp 0.7s linear infinite;margin:30px auto}
  @keyframes sp{to{transform:rotate(360deg)}}
  .mc-center{display:flex;justify-content:center;padding:30px}
  .mc-empty{padding:26px;text-align:center;color:var(--mc-faint);background:var(--mc-panel);border:1px dashed var(--mc-border);border-radius:10px}
  .mc-err{color:var(--mc-bad);background:#1c1320;border:1px solid #4a2030;border-radius:10px;padding:14px;white-space:pre-wrap;font-family:ui-monospace,Menlo,monospace;font-size:12.5px}
  .mc-toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
  .mc-input{background:var(--mc-panel-2);border:1px solid var(--mc-border);border-radius:8px;padding:8px 12px;color:var(--mc-fg);font:inherit;min-width:200px}
  .mc-input:focus{outline:none;border-color:var(--mc-accent)}
  select.mc-input{cursor:pointer}
  .mc-id{font-family:ui-monospace,Menlo,monospace;font-size:12px;color:var(--mc-muted)}
  .mc-muted{color:var(--mc-muted)}
  .mc-sub{color:var(--mc-faint);font-size:12.5px;margin:2px 0 0}
  .mc-back{background:none;border:0;color:var(--mc-accent-2);display:inline-flex;align-items:center;gap:6px;font-size:13px;padding:0;margin-right:12px}
  .mc-bar{display:flex;align-items:flex-end;gap:3px;height:60px}
  .mc-bar .b{flex:1;background:linear-gradient(180deg,var(--mc-accent),#0e7490);border-radius:3px 3px 0 0;min-height:2px}
  .mc-bar-col{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;color:var(--mc-faint)}
  .mc-chat{max-height:780px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
  .mc-msg{border-radius:10px;padding:10px 12px;font-size:13px;max-width:88%}
  .mc-msg.user{background:#16263a;align-self:flex-end;color:#f8f8f8}
  .mc-msg.assistant{background:var(--mc-panel-2);align-self:flex-start;border:1px solid var(--mc-border)}
  .mc-msg .role{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--mc-faint);margin-bottom:4px}
  .mc-logs{background:#0a0d13;border:1px solid var(--mc-border);border-radius:10px;padding:14px;font-family:ui-monospace,Menlo,monospace;font-size:12px;white-space:pre-wrap;max-height:560px;overflow-y:auto;line-height:1.6}
  .ln.err{color:var(--mc-bad)} .ln.warn{color:var(--mc-warn)} .ln.info{color:var(--mc-info)}
  /* ---- chat panel (resume / new session) ---- */
  .mc-chatwrap{display:flex;flex-direction:column;height:90vh;min-height:420px}
  .mc-chatbar{display:flex;gap:8px;align-items:center;padding:8px 0}
  .mc-chatbar .mc-input{flex:1}
  .mc-chat-main{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:6px 2px}
  .mc-msg .think{font-size:11.5px;color:var(--mc-faint);font-style:italic;margin-top:6px;border-top:1px dashed var(--mc-border);padding-top:6px}
  .mc-msg .tools{font-size:11px;color:var(--mc-accent-2);margin-top:6px;font-family:ui-monospace,Menlo,monospace}
  .mc-composer{display:flex;gap:8px;padding:10px 0 0;border-top:1px solid var(--mc-border);margin-top:6px}
  .mc-composer textarea{flex:1;resize:vertical;min-height:42px;max-height:160px}
  .mc-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--mc-good);margin-right:6px}
  .mc-dot.busy{background:var(--mc-warn);animation:pulse 1s infinite}
  @keyframes pulse{50%{opacity:.3}}
  .mc-chat-meta{font-size:12px;color:var(--mc-muted)}
  .mc-chip{display:inline-block;background:var(--mc-panel-2);border:1px solid var(--mc-border);border-radius:6px;padding:1px 7px;margin:2px;font-size:11px;font-family:ui-monospace,Menlo,monospace;color:var(--mc-fg)}
  .mc-toolcalls{margin-top:6px;display:flex;flex-direction:column;gap:3px}
  .mc-toolcall{font-family:ui-monospace,Menlo,monospace;font-size:11.5px;background:var(--mc-panel-2);border:1px solid var(--mc-border);border-left:3px solid var(--mc-accent-2);border-radius:5px;padding:3px 8px;color:var(--mc-fg);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .mc-toolresult{margin-top:6px;border:1px dashed var(--mc-border);border-radius:6px;padding:5px 8px;background:var(--mc-panel-2)}
  .mc-toolresult.compact{padding:3px 8px}
  .mc-toolresults{margin-top:6px;display:flex;flex-direction:column;gap:5px;border-left:2px solid var(--mc-border);padding-left:8px}
  .mc-toolresult-wrap{display:block}
  .mc-toolresult-tag{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--mc-accent-2);margin-right:6px;white-space:nowrap}
  .mc-toolresult-body{font-size:12px;color:var(--mc-muted)}
  .mc-spacer{flex:1 1 auto}
  .mc-select{background:var(--mc-panel-2);border:1px solid var(--mc-border);border-radius:8px;color:var(--mc-fg);padding:5px 8px;font-size:12px;max-width:240px}
  .mc-typing{display:inline-flex;align-items:center;gap:4px;color:var(--mc-muted);font-style:italic}
  .mc-typing i{width:6px;height:6px;border-radius:50%;background:var(--mc-accent-2);display:inline-block;animation:mcblink 1s infinite}
  .mc-typing i:nth-child(2){animation-delay:.15s}
  .mc-typing i:nth-child(3){animation-delay:.3s}
  @keyframes mcblink{0%,60%,100%{opacity:.25}30%{opacity:1}}
  /* ---- WS connection status ---- */
  .mc-conn{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--mc-muted);padding:3px 8px;border:1px solid var(--mc-border);border-radius:8px}
  .mc-conn .mc-dot{width:8px;height:8px;border-radius:50%;background:var(--mc-muted)}
  .mc-conn-connected .mc-dot{background:#22c55e}
  .mc-conn-connecting .mc-dot{background:#eab308;animation:pulse 1s infinite}
  .mc-conn-error .mc-dot{background:#ef4444}
  .mc-conn-idle .mc-dot{background:var(--mc-muted)}
  /* ---- searchable model picker ---- */
  .mc-modpick{position:relative;display:inline-block}
  .mc-modpick .mc-select{display:inline-flex;align-items:center;gap:6px;cursor:pointer;max-width:320px}
  .mc-modprov{color:var(--mc-muted);font-size:11px}
  .mc-caret{font-size:9px;opacity:.7}
  .mc-modlist{position:absolute;right:0;top:calc(100% + 6px);z-index:50;width:390px;background:var(--mc-panel);border:1px solid var(--mc-border);border-radius:10px;box-shadow:0 10px 30px rgba(0,0,0,.4);padding:6px;max-height:360px;overflow-y:auto}
  .mc-modsearch{margin-bottom:6px;width:100%}
  .mc-modopt{display:flex;gap:6px;align-items:baseline;padding:6px 8px;border-radius:6px;cursor:pointer;font-size:12px;font-family:ui-monospace,Menlo,monospace}
  .mc-modopt:hover{background:var(--mc-panel-2)}
  .mc-modopt.active{background:rgba(45,212,191,.14);outline:1px solid var(--mc-accent-2)}
  .mc-modempty{padding:10px;color:var(--mc-muted);font-size:12px}
  /* ---- markdown rendered in chat ---- */
  .md{line-height:1.55}
  .md p{margin:0 0 8px}
  .md p:last-child{margin-bottom:0}
  .md h1,.md h2,.md h3,.md h4{margin:4px 0 8px;line-height:1.25}
  .md h1{font-size:16px}.md h2{font-size:15px}.md h3{font-size:14px}.md h4{font-size:13px}
  .md ul{margin:0 0 8px;padding-left:20px}
  .md li{margin:2px 0}
  .md code{background:var(--mc-panel-2);color:var(--mc-fg);border:1px solid var(--mc-border);border-radius:4px;padding:1px 5px;font-family:ui-monospace,Menlo,monospace;font-size:12px}

  React.useEffect(function () {
    if (!p.sessionId) return;
    fetchJSON("/api/sessions/" + encodeURIComponent(p.sessionId)).then(function (j) { setMeta(j && j.data ? j.data : null); }).catch(function () {});
  }, [p.sessionId]);
  const wsRef = React.useRef(null);
  const msgRef = React.useRef(null);
  const sidRef = React.useRef(p.sessionId || null);
  const attachedRef = React.useRef(false);    // has this session been loaded into the gateway on the current ws?
  const pendingRef = React.useRef({});       // rid -> {resolve, reject}

  // ---- model selector ----
  const reloadModels = useC(function () {
    fetchJSON("/api/model/options").then(function (opts) {
      const provs = (opts && opts.providers) || [];
      const list = [];
      provs.forEach(function (pr) {
        (pr.models || []).forEach(function (mid) {
          list.push({ id: mid, provider: pr.slug, label: mid });
        });
      });
      setModels(list);
    }).catch(function () {});
    fetchJSON("/api/model/info").then(function (info) {
      setCurModel((info && (info.model || info.default)) || "");
    }).catch(function () {});
  }, []);
  React.useEffect(function () { reloadModels(); }, []);
  React.useEffect(function () { ensureConn().catch(function () {}); }, []);
  // Load prior message history when resuming an existing session.
  React.useEffect(function () {
    if (!p.sessionId) return;
    fetchJSON("/api/sessions/" + encodeURIComponent(p.sessionId) + "/messages?limit=400")
      .then(function (j) {
        const arr = (j && (j.messages || j)) || [];
        const conv = arr
          .filter(function (m) { return m && (m.role === "user" || m.role === "assistant" || m.role === "tool"); })
          .map(function (m) {
            return { role: m.role, text: m.content || m.text || "", think: "", tools: (m.tool_calls || []).map(function (tc) { return (tc.name || tc.tool_name || "tool"); }), tool_name: m.tool_name || null, tool_calls: m.tool_calls || null, _results: [] };
          });
        if (conv.length) setMsgs(conv);
      })
      .catch(function () {});
  }, []);
  function setModel(id) {
    const m = (models || []).find(function (x) { return (x.id || x.model) === id; });
    const payload = { scope: "main", model: id, provider: m ? (m.provider || m.prov) : null };
    setCurModel(id);
    fetchJSON("/api/model/set", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    }).catch(function (e) { setErr("model set failed: " + e); });
  }

  const ensureConn = useC(function () {
    if (wsRef.current && wsRef.current.readyState === 1) return Promise.resolve();
    return resolveToken().then(function (tok) {
      if (!tok) throw new Error("No session token available (is the 9119 dashboard running?)");
      return new Promise(function (resolve, reject) {
        let ws;
        try { ws = new WebSocket(wsUrl(tok)); } catch (e) { reject(e); return; }
        wsRef.current = ws;
        setConnState("connecting");
        ws.onmessage = function (ev) {
          let m; try { m = JSON.parse(ev.data); } catch (e) { return; }
          if (m.method === "event") {
            handleEvent(m.params && m.params.type, (m.params && m.params.payload) || {});
          } else if (m.id != null && pendingRef.current[m.id]) {
            const cb = pendingRef.current[m.id]; delete pendingRef.current[m.id];
            if (m.error) cb.reject(m.error); else cb.resolve(m.result);
          }
        };
        ws.onopen = function () { setConnState("connected"); resolve(); };
        ws.onerror = function () { setConnState("error"); setErr("WebSocket error (is 9119 up?)"); reject(new Error("ws error")); };
        ws.onclose = function () { wsRef.current = null; attachedRef.current = false; setConnState("idle"); };
      });
    });
  }, []);

  function rpc(method, params) {
    return ensureConn().then(function () {
      const ws = wsRef.current;
      const rid = ++_chatRid;
      return new Promise(function (resolve, reject) {
        pendingRef.current[rid] = { resolve: resolve, reject: reject };
        ws.send(JSON.stringify({ jsonrpc: "2.0", id: rid, method: method, params: params }));
      });
    });
  }

  function handleEvent(t, pl) {
    if (t === "message.start") {
      const cur = { role: "assistant", text: "", think: "", tools: [] };
      msgRef.current = cur; setTyping(true); setBusy(true);
      setMsgs(function (a) { return a.concat([cur]); });
    } else if (t === "thinking.delta") {
      const cur = msgRef.current; if (cur) { cur.think += (pl.text || ""); setMsgs(function (a) { return a.slice(); }); }
    } else if (t === "message.delta") {
      const cur = msgRef.current; if (cur) { if (cur.text === "") setTyping(false); cur.text += (pl.text || ""); setMsgs(function (a) { return a.slice(); }); }
    } else if (t === "reasoning.available") {
      const cur = msgRef.current; if (cur) { cur.think = pl.text || cur.think; setMsgs(function (a) { return a.slice(); }); }
    } else if (t === "message.complete") {
      const cur = msgRef.current; if (cur) { cur.text = pl.text || cur.text; setMsgs(function (a) { return a.slice(); }); }
      msgRef.current = null; setTyping(false); setBusy(false);
    } else if (t === "tool.call" || t === "tool.start") {
      const cur = msgRef.current; if (cur) { cur.tools = cur.tools.concat([pl.name || "tool"]); setMsgs(function (a) { return a.slice(); }); }
    } else if (t === "error") {
      setErr(pl.message || "agent error"); setTyping(false); setBusy(false);
    }
  }

  function send(text) {
    setErr(null);
    const doSubmit = function (sid) {
      sidRef.current = sid;
      attachedRef.current = true;
      rpc("prompt.submit", { session_id: sid, text: text }).catch(function (e) {
        setErr("submit failed: " + (e && (e.message || JSON.stringify(e)))); setBusy(false); setTyping(false);
      });
    };
    if (!sidRef.current) {
      // New session: create it, then submit.
      rpc("session.create", { title: "Mission Control", source: "tui" })
        .then(function (res) { doSubmit((res && res.session_id) || (res && res.id)); })
        .catch(function (e) { setErr("session create failed: " + (e && (e.message || JSON.stringify(e)))); setBusy(false); });
    } else if (!attachedRef.current) {
      // Resuming an existing session: it must be loaded into the gateway first,
      // otherwise prompt.submit fails with "session not found".
      rpc("session.resume", { session_id: sidRef.current, cols: 100 })
        .then(function (res) { doSubmit((res && res.session_id) || sidRef.current); })
        .catch(function (e) { setErr("resume failed: " + (e && (e.message || JSON.stringify(e)))); setBusy(false); });
    } else {
      doSubmit(sidRef.current);
    }
  }
  function onSubmit(e) {
    if (e) e.preventDefault();
    const text = draft.trim(); if (!text || busy) return;
    setMsgs(function (a) { return a.concat([{ role: "user", text: text }]); });
    setDraft(""); send(text);
  }
  function onKey(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); onSubmit(e); }
  }
  const rows = mergeToolResults(msgs).map(function (mm, i) {
    const isToolResult = mm.role === "tool" || !!mm.tool_name;
    const tools = (mm.tools || []).map(function (n, j) {
      return h("span", { key: j, className: "mc-chip", style: { borderColor: "var(--mc-accent-2)", color: "var(--mc-accent-2)" } }, "⚙ " + n);
    });
    const merged = mm._results && mm._results.length;
    return h("div", { key: i, className: cn("mc-msg", mm.role === "user" ? "user" : "assistant") + (isToolResult ? " tool-result-msg" : "") },
      h("div", { className: "role" }, mm.role + (mm.tool_name && mm.role !== "tool" ? " · " + mm.tool_name : "")),
      isToolResult
        ? renderToolResult(mm)
        : (mm.role === "user"
          ? h("div", { className: "body" }, str(mm.text))
          : h("div", { className: "body md", dangerouslySetInnerHTML: { __html: mdToHtml(mm.text) } })),
      (tools.length && !isToolResult && !merged) ? h("div", { className: "tools" }, "tools used:", tools) : null,
      renderToolCalls(mm),
      merged ? h("div", { className: "mc-toolresults" }, mm._results.map(function (r, j) {
        return h("div", { key: j, className: "mc-toolresult-wrap" }, renderToolResult(r));
      })) : null,
      mm.think ? h("div", { className: "think" }, h("strong", null, "thinking: "), h("span", { dangerouslySetInnerHTML: { __html: mdToHtml(mm.think) } })) : null);
  });
  const typingRow = typing ? h("div", { className: "mc-msg assistant" },
    h("div", { className: "role" }, "assistant"),
    h("div", { className: "body" }, h("span", { className: "mc-typing" }, h("i"), h("i"), h("i"), " Hermes is typing…"))) : null;
  return h("div", { className: "mc-chatwrap" },
    h("div", { className: "mc-chatbar" },
      p.onBack ? h("button", { className: "mc-btn", onClick: p.onBack }, "← Back") : null,
      h("span", { className: "mc-chat-meta" }, p.sessionId ? ("Resuming " + (meta && (meta.title || meta.name) ? meta.title || meta.name : p.sessionId)) : "New session"),
      h("span", { className: "mc-spacer" }),
      h("span", { className: "mc-conn mc-conn-" + connState, title: "WS: " + CONN_LABEL[connState] },
        h("span", { className: "mc-dot" }), CONN_LABEL[connState]),
      models && models.length
        ? h(ModelPicker, { models: models, cur: curModel, onSelect: setModel })
        : null),
    h("div", { className: "mc-chat-main" },
      rows.length || typing ? h("div", null, rows, typingRow) : h("div", { className: "mc-empty" }, "Send a message to start a conversation.")),
    err ? h("div", { className: "mc-err", style: { margin: "0 16px 8px" } }, String(err.message || err)) : null,
    h("form", { className: "mc-composer", onSubmit: onSubmit },
      h("textarea", { className: "mc-input", placeholder: busy ? "Hermes is thinking…" : "Message Hermes…  (Enter to send, Shift+Enter for newline)", value: draft, disabled: busy,
        onChange: function (e) { setDraft(e.target.value); }, onKeyDown: onKey }),
      h("button", { className: "mc-btn primary", type: "submit", disabled: busy }, busy ? "…" : "Send")));
}

function SessionDetail(p) {
  const m = useAsync(function () { return fetchJSON("/api/sessions/" + encodeURIComponent(p.id) + "/messages?limit=400"); }, [p.id]);
  const meta = useAsync(function () { return fetchJSON("/api/sessions/" + encodeURIComponent(p.id)); }, [p.id]);
  const title = (meta.data && (meta.data.title || meta.data.name)) || p.id;
  return h("div", null,
    h("div", { className: "mc-chatbar", style: { alignItems: "center" } },
      BackBtn({ onClick: p.onBack }),
      h("button", { className: "mc-btn primary", onClick: function () { p.nav({ name: "sessionchat", id: p.id }); } }, "Resume & chat"),
      h("h2", { className: "mc-h", style: { marginTop: 0, marginLeft: 10 } }, title),
      meta.data ? h("span", { className: "mc-chat-meta" },
        "  ·  " + str(meta.data.source || "cli") + "  ·  " + (meta.data.started_at ? timeAgo(meta.data.started_at * 1000) : "")) : null),
    m.loading ? h("div", { className: "mc-center" }, Spinner())
      : m.error ? ErrBox({ error: m.error })
      : h("div", { className: "mc-chat" }, mergeToolResults(m.data && m.data.messages ? m.data.messages : []).map(function (msg, i) {
          const role = (msg.role || "assistant").toLowerCase();
          const isToolResult = role === "tool" || !!msg.tool_name;
          // A merged assistant message may carry _results (its tool outputs).
          const merged = msg._results && msg._results.length;
          return h("div", { key: i, className: cn("mc-msg", role === "user" ? "user" : "assistant") + (isToolResult ? " tool-result-msg" : "") },
            h("div", { className: "role" }, role + (msg.tool_name && role !== "tool" ? " · " + msg.tool_name : "")),
            isToolResult
              ? renderToolResult(msg)
              : h("div", { className: "body md", dangerouslySetInnerHTML: { __html: mdToHtml(msg.content) } }),
            renderToolCalls(msg),
            merged ? h("div", { className: "mc-toolresults" }, msg._results.map(function (r, j) {
              return h("div", { key: j, className: "mc-toolresult-wrap" }, renderToolResult(r));
            })) : null);
        })));
}

// Error boundary so a throw shows the message instead of a blank page.
class EB extends React.Component {
  constructor(p) { super(p); this.state = { err: null }; }
  static getDerivedStateFromError(e) { return { err: e }; }
  componentDidCatch(e) { console.error("MissionControl view error:", e); }
  render() {
    if (this.state.err) {
      return h("div", { className: "mc-err", style: { margin: 24, whiteSpace: "pre-wrap" } },
        "View error:\n" + (this.state.err && this.state.err.stack ? this.state.err.stack : String(this.state.err)));
    }
    return this.props.children;
  }
}

(function mount() {
  const el = document.getElementById("mc-root");
  if (!el) { console.error("MissionControl: #mc-root not found"); return; }
  try {
    ReactDOM.createRoot(el).render(h(EB, null, h(App)));
  } catch (e) {
    console.error("MissionControl mount failed:", e);
    el.innerHTML = '<div class="mc-err" style="margin:24px;white-space:pre-wrap">Mount error:\n' + (e && e.stack ? e.stack : e) + "</div>";
  }
})();
</script>
</body>
</html>
